name: Update Supermarket Prices

on:
  schedule:
    # Every hour
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write   # needed to dispatch deploy.yml after data update
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Fetch and update supermarket prices
        run: node scripts/update-supermarket-prices.mjs

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "DealsHub Bot"
          git config user.email "bot@dealshub.cy"
          git add posts/en/supermarket-price-watch.md
          git add posts/el/supermarket-price-watch.md
          git add posts/ru/supermarket-price-watch.md
          git add src/data/supermarket-prices.json
          git commit -m "chore: auto-update supermarket prices $(date +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin master
          git push origin master

      - name: Trigger Cloudflare redeploy
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref master
