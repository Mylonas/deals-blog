name: Update Supermarket Deals

# Runs once daily at 06:00 UTC via GitHub's schedule, like every other data
# workflow in this repo. The Cloudflare Worker (workers/cron-trigger) no longer
# dispatches this workflow — its daily dispatch never fired, which left the
# deals data stale.
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

concurrency:
  group: update-supermarket-deals
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Fetch cheapest supermarket products
        run: node scripts/update-supermarket-deals.mjs

      - name: Check for changes
        id: changes
        run: git diff --quiet || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "DealsHub Bot"
          git config user.email "bot@dealshub.cy"
          git add src/data/supermarket-deals.json src/data/product-price-history.json
          git commit -m "chore: update supermarket deals $(date +'%Y-%m-%d')"
          git pull --rebase origin master
          git push origin master

      - name: Trigger Cloudflare redeploy
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref master
