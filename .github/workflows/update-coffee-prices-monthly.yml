name: Update Coffee Prices (Monthly Headless)

on:
  schedule:
    # 1st of every month at 06:00 UTC
    - cron: "0 6 1 * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright + Chromium
        run: npx playwright install chromium --with-deps

      - name: Scrape coffee prices
        run: DEBUG=1 node scripts/update-coffee-prices-headless.mjs

      - name: Upload debug screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coffee-scraper-debug
          path: /tmp/coffee-debug/
          if-no-files-found: ignore

      - name: Regenerate markdown posts
        run: node scripts/update-coffee-prices.mjs

      - name: Commit and push if changed
        run: |
          git config user.name "DealsHub Bot"
          git config user.email "bot@dealshub.cy"
          git add src/data/coffee-prices.json
          git add posts/en/cheapest-coffee-nicosia.md
          git add posts/el/cheapest-coffee-nicosia.md
          git add posts/ru/cheapest-coffee-nicosia.md
          git diff --cached --quiet || git commit -m "chore: update coffee prices via headless scraper $(date +'%Y-%m')"
          git pull --rebase origin master
          git push origin master
