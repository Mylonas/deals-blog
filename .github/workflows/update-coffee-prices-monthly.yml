name: Update Coffee Prices (Weekly)

on:
  schedule:
    # Every Monday at 06:00 UTC — Wolt API scrape is cheap, no browser needed
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write   # needed to dispatch deploy.yml after data update

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Update Freddo prices via Wolt API
        run: node scripts/update-freddo-prices.mjs

      - name: Regenerate markdown posts
        run: node scripts/update-coffee-prices.mjs

      - name: Commit and push if changed
        id: coffee_push
        run: |
          git config user.name "DealsHub Bot"
          git config user.email "bot@dealshub.cy"
          git add src/data/coffee-prices.json
          git add posts/en/cheapest-coffee-nicosia.md
          git add posts/el/cheapest-coffee-nicosia.md
          git add posts/ru/cheapest-coffee-nicosia.md
          git diff --cached --quiet || (git commit -m "chore: update coffee prices via Wolt API $(date +'%Y-%m-%d')" && echo "changed=true" >> $GITHUB_OUTPUT)
          git pull --rebase origin master
          git push origin master

      - name: Trigger Cloudflare redeploy
        if: steps.coffee_push.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref master
