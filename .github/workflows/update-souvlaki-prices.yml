name: Update Souvlaki Prices (Weekly)

on:
  schedule:
    # Every Tuesday at 06:00 UTC — Wolt API scan, no browser needed
    - cron: "0 6 * * 2"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write   # needed to dispatch deploy.yml after data update

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Update souvlaki prices via Wolt API
        run: node scripts/update-souvlaki-prices.mjs

      - name: Check for changes
        id: changes
        run: git diff --quiet || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "DealsHub Bot"
          git config user.email "bot@dealshub.cy"
          git add src/data/souvlaki-prices.json
          git commit -m "chore: update souvlaki prices $(date +'%Y-%m-%d')"
          git pull --rebase origin master
          git push origin master

      - name: Trigger Cloudflare redeploy
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref master
