name: Update Fuel Prices

on:
  schedule:
    # Every hour
    - cron: "0 * * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Fetch and update fuel prices
        run: node scripts/update-fuel-prices.mjs

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "DealsHub Bot"
          git config user.email "bot@dealshub.cy"
          git add posts/en/cheapest-petrol-stations-cyprus.md
          git add posts/el/cheapest-petrol-stations-cyprus.md
          git add posts/ru/cheapest-petrol-stations-cyprus.md
          git add src/data/fuel-prices.json
          git add src/data/fuel-price-history.json
          git commit -m "chore: auto-update fuel prices $(date +'%Y-%m-%d %H:%M UTC')"
          git pull --rebase origin master
          git push origin master
