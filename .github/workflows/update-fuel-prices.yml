name: Update Fuel Prices

on:
  schedule:
    # Every Monday at 07:00 UTC (09:00 Cyprus time)
    - cron: "0 7 * * 1"
  workflow_dispatch: # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch and update fuel prices
        run: node scripts/update-fuel-prices.mjs

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "DealsHub Bot"
          git config user.email "bot@dealshub.cy"
          git add posts/en/cheapest-petrol-stations-cyprus.md
          git add posts/el/cheapest-petrol-stations-cyprus.md
          git add posts/ru/cheapest-petrol-stations-cyprus.md
          git commit -m "chore: auto-update fuel prices $(date +'%Y-%m-%d')"
          git push origin master
