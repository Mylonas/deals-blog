name: Update Bazaraki Cars (Daily)

# Scrape every car listing on Bazaraki (rubric 5) via its JSON API. Runs once
# a day at 03:00 UTC — earlier than the other daily jobs (06:00) to spread
# load. Playwright is used only to clear the Cloudflare Managed Challenge on
# the homepage, then the API is read same-origin with the cf_clearance cookie.
on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

concurrency:
  group: update-bazaraki-cars
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      actions: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Scrape Bazaraki cars
        run: node scripts/update-bazaraki-cars.mjs
        timeout-minutes: 45

      - name: Check for changes
        id: changes
        run: git diff --quiet || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "DealsHub Bot"
          git config user.email "bot@dealshub.cy"
          git add src/data/bazaraki-cars.json
          git commit -m "chore: update bazaraki cars $(date +'%Y-%m-%d')"
          for i in 1 2 3 4 5; do
            git push origin master && exit 0
            sleep $((RANDOM % 8 + 2))
            git pull --rebase origin master || true
          done
          exit 1

      - name: Trigger Cloudflare redeploy
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy.yml --ref master
