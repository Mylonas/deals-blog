name: Update Coffee Prices

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Update coffee prices
        run: node scripts/update-coffee-prices.mjs

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/coffee-prices.json posts/en/cheapest-coffee-nicosia.md posts/el/cheapest-coffee-nicosia.md posts/ru/cheapest-coffee-nicosia.md
          git diff --cached --quiet || git commit -m "chore: update coffee prices [skip ci]"
          git pull --rebase origin master
          git push
